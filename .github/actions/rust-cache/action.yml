name: Rust cache
description: Shared Swatinem/rust-cache defaults for workpot workflows
inputs:
  shared-key:
    description: Stable key shared across jobs (e.g. ci, release)
    required: true
  key:
    description: Optional suffix (runner.os, matrix arch, etc.)
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Save and restore Rust build cache
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        shared-key: ${{ inputs.shared-key }}
        key: ${{ inputs.key }}
        cache-on-failure: true
        cache-workspace-crates: true
