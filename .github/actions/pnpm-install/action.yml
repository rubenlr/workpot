name: pnpm install
description: Node toolchain + pnpm cache restore + clean install
inputs:
  node-version:
    required: true
runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
    - run: pnpm install --frozen-lockfile
      shell: bash
