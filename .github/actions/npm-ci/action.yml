name: npm ci
description: Node toolchain + npm cache restore + clean install
inputs:
  node-version:
    required: true
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm
        cache-dependency-path: package-lock.json
    - run: npm ci
      shell: bash
