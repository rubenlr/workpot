sonar.organization=rubenlr
sonar.projectKey=workpot

# Fail the scanner (and CI) when the project quality gate does not pass.
sonar.qualitygate.wait=true

sonar.sources=crates,src-tauri/src,src
sonar.tests=crates,src-tauri,src
sonar.test.inclusions=**/tests/**,**/*.test.ts,**/*_test.rs

sonar.exclusions=**/target/**,**/node_modules/**,**/.svelte-kit/**,**/build/**,**/src-tauri/gen/**,**/src-tauri/icons/**,**/*.rs.bk,**/src/app.html,**/*.stories.svelte,**/src/lib/storybook/**,**/src/lib/tray/storybook/**,**/src/lib/tray/repo-list/repoStoryFixtures.ts

# Non-testable frontend (types, constants, fixtures, route shells) — sync with scripts/coverage-exclusions.mjs
sonar.coverage.exclusions=**/src/lib/types.ts,**/src/lib/tray/constants.ts,**/src/lib/tray/storybook/**,**/src/lib/tray/repo-list/repoStoryFixtures.ts,**/src/lib/storybook/**,**/*.stories.svelte,**/src/lib/tray/trayTrace.ts,**/src/routes/+page.svelte,**/src/routes/+layout.svelte,**/src/routes/+layout.ts

sonar.rust.lcov.reportPaths=lcov-rust.info
sonar.javascript.lcov.reportPaths=lcov-js.info
sonar.typescript.tsconfigPath=tsconfig.json
sonar.sourceEncoding=UTF-8
