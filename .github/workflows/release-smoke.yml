name: release-smoke

# PR smoke: validate the release artifact contract without creating tags or
# uploading to GitHub Releases.

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/release*.yml"
      - "Cargo.toml"
      - "crates/**"

permissions:
  contents: read

concurrency:
  group: release-smoke-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  smoke:
    name: release smoke
    # Reusable release.yml declares github-release (contents: write); required even
    # though dry_run skips upload — GHA validates all nested jobs at parse time.
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: v0.0.0-smoke
      dry_run: true

  verify-contract:
    name: verify release contract
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: smoke-*
          merge-multiple: true

      - name: Validate aarch64-only artifact contract
        run: |
          set -euo pipefail
          test -f artifacts/workpot-macos-aarch64.tar.gz
          test -f artifacts/workpot-macos-aarch64.tar.gz.sha256
          test -f artifacts/Workpot-0.0.0-smoke-aarch64.dmg
          test -f artifacts/Workpot-0.0.0-smoke-aarch64.dmg.sha256

          for artifact in artifacts/*; do
            file="$(basename "$artifact")"
            case "$file" in
              workpot-macos-aarch64.tar.gz|\
              workpot-macos-aarch64.tar.gz.sha256|\
              Workpot-0.0.0-smoke-aarch64.dmg|\
              Workpot-0.0.0-smoke-aarch64.dmg.sha256)
                ;;
              *)
                echo "unexpected artifact in smoke output: $file" >&2
                exit 1
                ;;
            esac
          done
