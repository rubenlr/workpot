name: release-smoke

# PR smoke: full macOS release matrix without creating tags or uploading to GitHub Releases.

on:
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/release*.yml"
      - "Cargo.toml"
      - "crates/**"

permissions:
  contents: read

jobs:
  smoke:
    name: release smoke
    # Reusable release.yml declares github-release (contents: write); required even
    # though dry_run skips upload — GHA validates all nested jobs at parse time.
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: v0.0.0-smoke
      dry_run: true
