name: release-please

# Opens/updates a Release PR from conventional commits on master; merging that PR
# tags vX.Y.Z, creates the GitHub Release, and calls release.yml for binaries.

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: master
          config-file: .github/ci-assist/release-please-config.json
          manifest-file: .github/ci-assist/.release-please-manifest.json

  artifacts:
    name: release artifacts
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
    secrets: inherit
