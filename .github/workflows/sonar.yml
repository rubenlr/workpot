# Manual Sonar on an open PR only. Actions → Sonar → Run workflow → enter PR number.
# Branch protection still requires the sonarcloud check (.github/rulesets/workpot.json).
name: Sonar

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Open pull request number to analyze
        required: true
        type: number

permissions:
  contents: read
  pull-requests: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ inputs.pr_number }},
            });
            if (pr.data.state !== 'open') {
              core.setFailed(`PR #${{ inputs.pr_number }} is not open`);
              return;
            }
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('head_ref', pr.data.head.ref);
            core.setOutput('base_ref', pr.data.base.ref);
            core.setOutput('number', String(pr.data.number));

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          shared-key: llvm-cov

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Fetch dependencies
        run: cargo fetch

      - name: Test with coverage
        run: cargo llvm-cov test --offline --workspace --lcov --output-path lcov.info

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.pullrequest.key=${{ steps.pr.outputs.number }}
            -Dsonar.pullrequest.branch=${{ steps.pr.outputs.head_ref }}
            -Dsonar.pullrequest.base=${{ steps.pr.outputs.base_ref }}
