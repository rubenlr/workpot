name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: rustfmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
          components: rustfmt, clippy
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ matrix.os }}
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
      - name: Run Clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy -p workpot-core -p workpot-cli --all-targets -- -D warnings
      - name: Clippy tray crate
        if: matrix.os == 'macos-latest'
        run: cargo clippy -p workpot-tray --all-targets -- -D warnings
      # Disabled until Tauri 3 stable — transitive GTK3/unic advisories (macOS v1). See CONTRIBUTING.md.
      # - name: Install cargo-deny
      #   if: matrix.os == 'ubuntu-latest'
      #   uses: taiki-e/install-action@v2
      #   with:
      #     tool: cargo-deny
      #     fallback: none
      # - name: Run cargo deny
      #   if: matrix.os == 'ubuntu-latest'
      #   run: cargo deny check --config .github/ci-assist/deny.toml
      # - name: Install cargo-audit
      #   if: matrix.os == 'ubuntu-latest'
      #   uses: taiki-e/install-action@v2
      #   with:
      #     tool: cargo-audit
      #     fallback: none
      # - name: Run cargo audit
      #   if: matrix.os == 'ubuntu-latest'
      #   run: cargo audit

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ matrix.os }}
      - name: Fetch dependencies (macOS D-12)
        if: matrix.os == 'macos-latest'
        run: cargo fetch
      - name: Setup Node.js
        if: matrix.os == 'macos-latest'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install npm dependencies
        if: matrix.os == 'macos-latest'
        run: npm ci
      - name: Test
        if: matrix.os == 'macos-latest'
        run: cargo test -p workpot-core -p workpot-cli -p workpot-tray --all-targets
      - name: Frontend check and test
        if: matrix.os == 'macos-latest'
        run: |
          npm run format:check
          npm run lint
          npm run check
          npm test
      - name: Tauri bundle smoke
        if: matrix.os == 'macos-latest'
        run: npm run tauri build
        env:
          CI: true
      - name: Test
        if: matrix.os != 'macos-latest'
        run: cargo test -p workpot-core -p workpot-cli --all-targets

  coverage:
    name: coverage (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ matrix.os }}
      - name: Fetch dependencies
        run: cargo fetch
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
          fallback: none
      - name: Test with coverage (core + cli)
        if: matrix.os == 'ubuntu-latest'
        run: cargo llvm-cov test -p workpot-core -p workpot-cli --lcov --output-path lcov-core-cli.info
      - name: Test with coverage (tray)
        if: matrix.os == 'macos-latest'
        run: cargo llvm-cov test -p workpot-tray --lcov --output-path lcov-tray.info
      - name: Upload core + cli coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-core-cli.info
          path: lcov-core-cli.info
          retention-days: 7
      - name: Upload tray coverage
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: lcov-tray.info
          path: lcov-tray.info
          retention-days: 7

  sonarcloud:
    name: sonarcloud
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: lcov-core-cli.info

      - uses: actions/download-artifact@v4
        with:
          name: lcov-tray.info

      - name: Merge LCOV reports
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lcov
          lcov -a lcov-core-cli.info -a lcov-tray.info -o lcov.info --ignore-errors empty

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dproject.settings=.github/ci-assist/sonar-project.properties
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}

  release-build:
    name: cargo build --release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - name: Build release CLI
        run: cargo build --release -p workpot-cli
      - name: Verify CLI version
        run: ./target/release/workpot --version
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Build tray release
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run check
          npm test
          npm run tauri build
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: ci-workpot-macos-aarch64
          path: target/release/workpot
