name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
          components: rustfmt
      - uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
          components: clippy
      - uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ matrix.os }}
      - name: Fetch dependencies (macOS D-12)
        if: matrix.os == 'macos-latest'
        run: cargo fetch
      - name: Check no network deps (DATA-02)
        if: matrix.os == 'macos-latest'
        run: bash scripts/check-no-network-deps.sh
      - name: Test offline (macOS D-12)
        if: matrix.os == 'macos-latest'
        run: cargo test --offline --workspace --all-targets
      - name: Test
        if: matrix.os != 'macos-latest'
        run: cargo test --workspace --all-targets

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
          fallback: none
      - name: Fetch dependencies
        run: cargo fetch
      - name: Check no network deps (DATA-02)
        run: bash scripts/check-no-network-deps.sh
      - name: Build workspace offline
        run: cargo build --offline --workspace
      - name: Test with coverage
        run: cargo llvm-cov test --offline --workspace --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: lcov.info
          path: lcov.info
          retention-days: 7

  release-build:
    name: cargo build --release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - run: cargo build --release -p workpot-cli
      - run: ./target/release/workpot --version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-workpot-macos-aarch64
          path: target/release/workpot

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
          fallback: none
      - run: cargo deny check --config .github/ci-assist/deny.toml

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
          fallback: none
      - run: cargo audit
