name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  NODE_VERSION: "24"

permissions:
  contents: read
  pull-requests: write

jobs:
  code-quality:
    name: code-quality (macos-latest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
          components: rustfmt, clippy
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: macos-latest
      - name: Install clippy-sarif tooling
        uses: taiki-e/install-action@v2
        with:
          tool: clippy-sarif,sarif-fmt
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: Clippy SARIF
        continue-on-error: true
        run: |
          cargo clippy -p workpot-core -p workpot-cli --all-targets --message-format=json 2>/dev/null \
            | clippy-sarif | tee rust-clippy-results.sarif | sarif-fmt
      - name: Upload Clippy SARIF
        if: always() && hashFiles('rust-clippy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: rust-clippy-results.sarif
          wait-for-processing: true
      - name: Clippy gate
        run: cargo clippy -p workpot-core -p workpot-cli --all-targets -- -D warnings
      - name: OSSAR
        uses: github/ossar-action@v1
        id: ossar
        continue-on-error: true
      - name: Upload OSSAR SARIF
        if: always() && steps.ossar.outputs.sarifFile != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.ossar.outputs.sarifFile }}
          wait-for-processing: true
      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false
      - name: Upload Scorecard artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
          wait-for-processing: true

  test-macos:
    name: test (macos-latest)
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: macos-latest
      - name: Fetch dependencies (macOS D-12)
        run: cargo fetch
      - name: Install pnpm dependencies
        uses: ./.github/actions/pnpm-install
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Test
        run: cargo test -p workpot-core -p workpot-cli -p workpot-tray --all-targets
      - name: Frontend check and test coverage
        run: |
          pnpm run format:check
          pnpm run lint:check
          pnpm run check
          pnpm run test:coverage
          cp coverage/lcov.info lcov-js.info
      - name: ESLint SARIF
        continue-on-error: true
        env:
          SARIF_ESLINT_IGNORE_SUPPRESSED: "true"
        run: pnpm run lint:sarif
      - name: Upload ESLint SARIF
        if: always() && hashFiles('eslint-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: eslint-results.sarif
          wait-for-processing: true
      - name: Tauri bundle smoke
        run: pnpm run tauri:build
        env:
          CI: true
      - name: Upload JS coverage
        uses: actions/upload-artifact@v7
        with:
          name: lcov-js.info
          path: lcov-js.info
          retention-days: 7

  coverage:
    name: coverage
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - name: Fetch dependencies
        run: cargo fetch
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
          fallback: none
      - name: Rust test coverage
        run: |
          cargo llvm-cov test -p workpot-core -p workpot-cli --lcov --output-path lcov-core-cli.info
          cargo llvm-cov test -p workpot-tray --lcov --output-path lcov-tray.info
      - name: Upload core + cli coverage
        uses: actions/upload-artifact@v7
        with:
          name: lcov-core-cli.info
          path: lcov-core-cli.info
          retention-days: 7
      - name: Upload tray coverage
        uses: actions/upload-artifact@v7
        with:
          name: lcov-tray.info
          path: lcov-tray.info
          retention-days: 7

  sonarcloud:
    name: sonarcloud
    needs: [coverage, test-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          name: lcov-core-cli.info

      - uses: actions/download-artifact@v8
        with:
          name: lcov-tray.info

      - uses: actions/download-artifact@v8
        with:
          name: lcov-js.info

      - name: Merge Rust LCOV reports
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lcov
          lcov -a lcov-core-cli.info -a lcov-tray.info -o lcov-rust.info --ignore-errors empty
          test -f lcov-js.info

      - name: Install pnpm dependencies
        uses: ./.github/actions/pnpm-install
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm exec svelte-kit sync

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dproject.settings=.github/ci-assist/sonar-project.properties
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}

  release-check:
    name: release-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - run: bash scripts/check-release-pr.sh
