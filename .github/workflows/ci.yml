name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  NODE_VERSION: "24"

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: rustfmt (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
          components: rustfmt, clippy
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ matrix.os }}
      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
      - name: Run Clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy -p workpot-core -p workpot-cli --all-targets -- -D warnings
      - name: Clippy tray crate
        if: matrix.os == 'macos-latest'
        run: cargo clippy -p workpot-tray --all-targets -- -D warnings
      # Disabled until Tauri 3 stable — transitive GTK3/unic advisories (macOS v1). See CONTRIBUTING.md.
      # - name: Install cargo-deny
      #   if: matrix.os == 'ubuntu-latest'
      #   uses: taiki-e/install-action@v2
      #   with:
      #     tool: cargo-deny
      #     fallback: none
      # - name: Run cargo deny
      #   if: matrix.os == 'ubuntu-latest'
      #   run: cargo deny check --config .github/ci-assist/deny.toml
      # - name: Install cargo-audit
      #   if: matrix.os == 'ubuntu-latest'
      #   uses: taiki-e/install-action@v2
      #   with:
      #     tool: cargo-audit
      #     fallback: none
      # - name: Run cargo audit
      #   if: matrix.os == 'ubuntu-latest'
      #   run: cargo audit

  # Disabled until Tauri 3 stable — transitive GTK3/unic advisories (macOS v1). See CONTRIBUTING.md.
  # test-linux:
  #   name: test (ubuntu-latest)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v5
  #     - name: Install Rust toolchain
  #       uses: dtolnay/rust-toolchain@master
  #       with:
  #         toolchain: 1.96
  #     - name: Restore Rust cache
  #       uses: ./.github/actions/rust-cache
  #       with:
  #         shared-key: ci
  #         key: ubuntu-latest
  #     - name: Test
  #       run: cargo test -p workpot-core -p workpot-cli --all-targets

  test-macos:
    name: test (macos-latest)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: macos-latest
      - name: Fetch dependencies (macOS D-12)
        run: cargo fetch
      - name: Install npm dependencies
        uses: ./.github/actions/npm-ci
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Test
        run: cargo test -p workpot-core -p workpot-cli -p workpot-tray --all-targets
      - name: Frontend check and test coverage
        run: |
          npm run format:check
          npm run lint:check
          npm run check
          npm run test:coverage
          cp coverage/lcov.info lcov-js.info
      - name: Tauri bundle smoke
        run: npm run tauri build
        env:
          CI: true
      - name: Upload JS coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov-js.info
          path: lcov-js.info
          retention-days: 7

  coverage:
    name: coverage
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - name: Fetch dependencies
        run: cargo fetch
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
          fallback: none
      - name: Rust test coverage
        run: |
          cargo llvm-cov test -p workpot-core -p workpot-cli --lcov --output-path lcov-core-cli.info
          cargo llvm-cov test -p workpot-tray --lcov --output-path lcov-tray.info
      - name: Upload core + cli coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov-core-cli.info
          path: lcov-core-cli.info
          retention-days: 7
      - name: Upload tray coverage
        uses: actions/upload-artifact@v4
        with:
          name: lcov-tray.info
          path: lcov-tray.info
          retention-days: 7

  sonarcloud:
    name: sonarcloud
    needs: [coverage, test-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: lcov-core-cli.info

      - uses: actions/download-artifact@v4
        with:
          name: lcov-tray.info

      - uses: actions/download-artifact@v4
        with:
          name: lcov-js.info

      - name: Merge Rust LCOV reports
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lcov
          lcov -a lcov-core-cli.info -a lcov-tray.info -o lcov-rust.info --ignore-errors empty
          test -f lcov-js.info

      - name: Install npm dependencies
        uses: ./.github/actions/npm-ci
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npx svelte-kit sync

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dproject.settings=.github/ci-assist/sonar-project.properties
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.event.pull_request.head.ref }}
            -Dsonar.pullrequest.base=${{ github.event.pull_request.base.ref }}

  release-build:
    name: cargo build --release
    needs: [test-macos]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
      - name: Restore Rust cache
        uses: ./.github/actions/rust-cache
        with:
          shared-key: ci
          key: ${{ runner.os }}
      - name: Build release CLI
        run: cargo build --release -p workpot-cli
      - name: Verify CLI version
        run: ./target/release/workpot --version
      - uses: actions/upload-artifact@v4
        with:
          name: ci-workpot-macos-aarch64
          path: target/release/workpot
