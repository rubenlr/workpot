name: release

# Builds macOS aarch64 CLI tarball + checksum and Workpot DMG + checksum,
# then uploads them to an existing GitHub Release.
# Invoked by release-artifacts.yml on release: published, release-smoke (dry_run),
# or manually via workflow_dispatch.
# release-publish.yml creates the GitHub Release and tag on master when version increases.

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag (e.g. v0.1.0)
        required: true
        type: string
      dry_run:
        description: Smoke mode — build matrix only, no release upload
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build/upload (e.g. v0.1.0)
        required: true
        type: string
      dry_run:
        description: Smoke mode — build matrix only, no release upload
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.event.inputs.tag }}

# Real releases serialize per tag; PR smoke uses a unique group so a stuck/queued
# matrix leg does not block every other PR (smoke tag is always v0.0.0-smoke).
concurrency:
  group: ${{ inputs.dry_run && format('release-smoke-{0}', github.run_id) || format('release-{0}', inputs.tag || github.event.inputs.tag) }}
  cancel-in-progress: ${{ inputs.dry_run }}

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.flags.outputs.dry_run }}
      checkout_ref: ${{ steps.flags.outputs.checkout_ref }}
    steps:
      - id: flags
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ inputs.tag || github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

  ensure-master:
    name: ensure release is on master
    needs: prepare
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Require version tag on master
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          git fetch origin master
          git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_sha="$(git rev-parse "${RELEASE_TAG}")"
          if ! git merge-base --is-ancestor "$tag_sha" origin/master; then
            echo "tag ${RELEASE_TAG} is not on origin/master" >&2
            exit 1
          fi

  validate-version:
    name: validate release version
    needs: [prepare, ensure-master]
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - id: version
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          manifest_version="$(bash scripts/read-workspace-version.sh)"
          if [ -z "$manifest_version" ]; then
            echo "could not read version file (scripts/read-workspace-version.sh)" >&2
            exit 1
          fi
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "tag version v${tag_version} does not match version file ${manifest_version}" >&2
            exit 1
          fi
          echo "version=${tag_version}" >> "$GITHUB_OUTPUT"

  binary:
    name: macos aarch64 cli binary
    needs: [prepare, validate-version]
    if: always() && (needs.prepare.outputs.dry_run == 'true' || needs.validate-version.result == 'success')
    runs-on: macos-latest
    env:
      RELEASE_ARTIFACT: workpot-macos-aarch64
      RELEASE_ARCHIVE: workpot-macos-aarch64.tar.gz
      RELEASE_ARCHIVE_CHECKSUM: workpot-macos-aarch64.tar.gz.sha256
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96

      - uses: ./.github/actions/rust-cache
        with:
          shared-key: release
          key: aarch64

      - name: Build release binary
        run: cargo build --release -p workpot-cli

      - name: Create release tarball
        run: |
          artifact="$RELEASE_ARTIFACT"
          mkdir -p "dist/$artifact"
          cp target/release/workpot "dist/$artifact/workpot"
          cp README.md LICENSE "dist/$artifact/"
          tar -C "dist/$artifact" -czf "$RELEASE_ARCHIVE" .
          shasum -a 256 "$RELEASE_ARCHIVE" > "$RELEASE_ARCHIVE_CHECKSUM"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.dry_run == 'true' && format('smoke-{0}', env.RELEASE_ARTIFACT) || env.RELEASE_ARTIFACT }}
          path: |
            ${{ env.RELEASE_ARCHIVE }}
            ${{ env.RELEASE_ARCHIVE_CHECKSUM }}
          retention-days: ${{ needs.prepare.outputs.dry_run == 'true' && 7 || 90 }}

  dmg:
    name: macos aarch64 dmg
    needs: [prepare, validate-version]
    if: always() && (needs.prepare.outputs.dry_run == 'true' || needs.validate-version.result == 'success')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96

      - uses: ./.github/actions/rust-cache
        with:
          shared-key: release
          key: tauri-aarch64

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - id: signing
        name: Resolve signing policy
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_SIGNING_IDENTITY
            APPLE_API_ISSUER
            APPLE_API_KEY_ID
            APPLE_API_KEY
          )
          present=0
          missing=()
          for key in "${required_vars[@]}"; do
            if [ -n "${!key:-}" ]; then
              present=$((present + 1))
            else
              missing+=("$key")
            fi
          done

          if [ "$present" -eq 0 ]; then
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
            echo "::warning::APPLE signing secrets not configured. Building unsigned DMG (codesign/notarytool/stapler skipped by design)."
            exit 0
          fi

          if [ "$present" -ne "${#required_vars[@]}" ]; then
            echo "::error::Partial APPLE_ signing configuration detected. Missing: ${missing[*]}"
            echo "::error::Refusing release to avoid partially signed artifacts."
            exit 1
          fi

          echo "mode=signed" >> "$GITHUB_OUTPUT"

      - name: Build signed aarch64 DMG bundle
        if: steps.signing.outputs.mode == 'signed'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          set -euo pipefail
          echo "Building signed/notarized DMG (codesign + notarytool + stapler enabled)."
          npm run tauri:build -- --bundles dmg

      - name: Build unsigned aarch64 DMG bundle
        if: steps.signing.outputs.mode == 'unsigned'
        run: |
          set -euo pipefail
          echo "::warning::Continuing with unsigned DMG because APPLE_ secrets are absent."
          npm run tauri:build -- --bundles dmg

      - name: Rename DMG and create checksum
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          dmg_name="Workpot-${version}-aarch64.dmg"
          dmg_checksum="${dmg_name}.sha256"
          produced_dmg="$(ls src-tauri/target/release/bundle/dmg/*.dmg)"
          cp "$produced_dmg" "$dmg_name"
          shasum -a 256 "$dmg_name" > "$dmg_checksum"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.dry_run == 'true' && 'smoke-workpot-dmg-aarch64' || 'workpot-dmg-aarch64' }}
          path: |
            Workpot-*-aarch64.dmg
            Workpot-*-aarch64.dmg.sha256
          retention-days: ${{ needs.prepare.outputs.dry_run == 'true' && 7 || 90 }}

  github-release:
    name: github release
    needs: [prepare, binary, dmg, validate-version]
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload macOS artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" artifacts/* --clobber
          echo "Uploaded artifacts to release ${RELEASE_TAG}"
