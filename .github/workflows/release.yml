name: release

# Builds macOS aarch64 combined Workpot.app+CLI tarball + checksum,
# then uploads to an existing GitHub Release and updates the Homebrew tap.
# Invoked by release-publish.yml (after tagging), release-smoke (dry_run), or workflow_dispatch.

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag (e.g. v0.1.0)
        required: true
        type: string
      dry_run:
        description: Smoke mode — build matrix only, no release upload
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build/upload (e.g. v0.1.0)
        required: true
        type: string
      dry_run:
        description: Smoke mode — build matrix only, no release upload
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.event.inputs.tag }}

# Real releases serialize per tag; PR smoke uses a unique group so a stuck/queued
# matrix leg does not block every other PR (smoke tag is always v0.0.0-smoke).
concurrency:
  group: ${{ inputs.dry_run && format('release-smoke-{0}', github.run_id) || format('release-{0}', inputs.tag || github.event.inputs.tag) }}
  cancel-in-progress: ${{ inputs.dry_run }}

jobs:
  prepare:
    name: prepare
    runs-on: ubuntu-latest
    outputs:
      dry_run: ${{ steps.flags.outputs.dry_run }}
      checkout_ref: ${{ steps.flags.outputs.checkout_ref }}
    steps:
      - id: flags
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ] || [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "checkout_ref=${{ inputs.tag || github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

  ensure-master:
    name: ensure release is on master
    needs: prepare
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: master
          fetch-depth: 0

      - name: Require version tag on master
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          git fetch origin master
          git fetch origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_sha="$(git rev-parse "${RELEASE_TAG}")"
          if ! git merge-base --is-ancestor "$tag_sha" origin/master; then
            echo "tag ${RELEASE_TAG} is not on origin/master" >&2
            exit 1
          fi

  validate-version:
    name: validate release version
    needs: [prepare, ensure-master]
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - id: version
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          manifest_version="$(bash scripts/read-workspace-version.sh)"
          if [ -z "$manifest_version" ]; then
            echo "could not read version file (scripts/read-workspace-version.sh)" >&2
            exit 1
          fi
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "tag version v${tag_version} does not match version file ${manifest_version}" >&2
            exit 1
          fi
          echo "version=${tag_version}" >> "$GITHUB_OUTPUT"

  bundle:
    name: macos aarch64 app bundle
    needs: [prepare, validate-version]
    if: always() && (needs.prepare.outputs.dry_run == 'true' || needs.validate-version.result == 'success')
    runs-on: macos-latest
    env:
      # Workspace Cargo target dir is repo-root `target/` (src-tauri is a workspace member).
      MACOS_TARGET: aarch64-apple-darwin
      BUNDLE_MACOS_DIR: target/aarch64-apple-darwin/release/bundle/macos
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96
          targets: aarch64-apple-darwin

      - uses: ./.github/actions/rust-cache
        with:
          shared-key: release-bundle
          key: aarch64

      - uses: ./.github/actions/pnpm-install
        with:
          node-version: 24

      - name: Build release CLI binary
        run: cargo build --release -p workpot-cli --target "${MACOS_TARGET}"

      - name: Build release app bundle
        run: |
          pnpm run build
          pnpm exec tauri build --bundles app --config src-tauri/tauri.ci-build.json --target "${MACOS_TARGET}"

      - name: Verify app bundle path
        run: test -d "${BUNDLE_MACOS_DIR}/Workpot.app"

      - name: Inject CLI binary into app bundle
        run: cp "target/${MACOS_TARGET}/release/workpot" "${BUNDLE_MACOS_DIR}/Workpot.app/Contents/MacOS/workpot"

      - name: Verify both binaries present
        run: |
          test -f "${BUNDLE_MACOS_DIR}/Workpot.app/Contents/MacOS/workpot-tray"
          test -f "${BUNDLE_MACOS_DIR}/Workpot.app/Contents/MacOS/workpot"

      - name: Create release tarball
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          archive="Workpot-${version}-aarch64.tar.gz"
          checksum="${archive}.sha256"
          tar -C "${BUNDLE_MACOS_DIR}" -czf "$archive" Workpot.app
          shasum -a 256 "$archive" > "$checksum"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.dry_run == 'true' && 'smoke-workpot-bundle-aarch64' || 'workpot-bundle-aarch64' }}
          path: |
            Workpot-*-aarch64.tar.gz
            Workpot-*-aarch64.tar.gz.sha256
          retention-days: ${{ needs.prepare.outputs.dry_run == 'true' && 7 || 90 }}

  github-release:
    name: github release
    needs: [prepare, bundle, validate-version]
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: workpot-bundle-*
          merge-multiple: true

      - name: Upload macOS artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          gh release upload "$RELEASE_TAG" artifacts/* --clobber --repo "${{ github.repository }}"
          echo "Uploaded artifacts to release ${RELEASE_TAG}"

  tap-update:
    name: update homebrew tap
    needs: [prepare, github-release, validate-version]
    if: needs.prepare.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Compute artifact SHA256 from published release
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          archive="Workpot-${version}-aarch64.tar.gz"
          gh release download "${RELEASE_TAG}" --pattern "${archive}.sha256" --repo rubenlr/workpot
          sha256="$(awk '{print $1}' "${archive}.sha256")"
          echo "SHA256=${sha256}" >> "$GITHUB_ENV"
          echo "VERSION=${version}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5
        with:
          repository: rubenlr/homebrew-workpot
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-workpot

      - name: Sync tap repo
        working-directory: homebrew-workpot
        run: |
          set -euo pipefail
          git pull --rebase origin HEAD

      - name: Patch cask version and sha256
        working-directory: homebrew-workpot
        run: |
          set -euo pipefail
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/workpot.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/workpot.rb
          grep -q "version \"${VERSION}\"" Casks/workpot.rb
          grep -q "sha256 \"${SHA256}\"" Casks/workpot.rb

      - name: Commit and push tap update
        working-directory: homebrew-workpot
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/workpot.rb
          git commit -m "chore: bump workpot to v${VERSION}"
          git push
